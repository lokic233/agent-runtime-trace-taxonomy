policy_version: v3
decided_by: orchestrator_autonomous
decided_at: '2026-06-28'
taxonomy_development_models:
- claude_4_7
- claude_opus_4_5
- claude_sonnet_3_5
heldout_solver_models:
- claude_4_6
capability_audit_models:
- claude_4_6
coverage_gap:
  missing_dev_model: qwen2_5_code_agent_8b
  impact: 'The prompt''s default split names Qwen2.5-8B as a taxonomy-DEV model and Qwen2.5-32B as held
    out. On disk we have 32B (held out) but NOT 8B. We keep the policy AS WRITTEN: 32B stays held out
    and excluded from training; the 8B dev slot is simply empty. This means the "open-weight, weak/medium
    local solver" perspective is under-represented during taxonomy discovery. Mitigation: solver_C (3.5-sonnet,
    33.6%) provides a low-capability closed perspective; 32B annotations (post-freeze) will audit whether
    the taxonomy transfers to the open-weight local solver it was meant to serve.

    '
  do_not: Do NOT silently swap 32B into the dev set to fill the 8B gap.
  reversible_if: Owner explicitly promotes 32B to dev OR an 8B trace set is downloaded -> bump policy_version.
rules:
- Held-out traces MUST NOT influence taxonomy category creation or revision.
- Held-out annotations MUST NOT appear in exports/lora_semantic_train.jsonl.
- Preserve a model-transfer test split (32B) and a repository-transfer test split.
v2_change:
  decided_by: project_owner (dengcchi), explicit
  decided_at: '2026-06-28'
  change: Qwen2.5-32B (solver_E) PROMOTED from held-out -> TRAINING set. Owner authorized for the 7-8B
    LOCAL controller (32B is a local open-weight solver, aligned with deployment target).
  consequence: The model-transfer (local-solver) holdout is RELAXED. solver_E now eligible for LoRA training.
  transfer_eval_preserved_via:
  - REPOSITORY-transfer test split is still enforced in export (repo-disjoint train/test).
  - solver_F (opus-4.6) reserved as the FUTURE model-transfer holdout (annotated good-to-have, NOT in
    this training round).
  reversible: revert to v1 by re-excluding solver_E from the training export.
v3_change:
  decided_by: orchestrator autonomous (owner granted full autonomy 2026-06-28)
  rationale: 'Empirical behavioral-distribution test of ALL downloadable 32B-class sets showed NONE is
    clean: E(SWE-agent-LM) custom-ACI outlier; G(Skywork) RL-looping (88% dup-calls,44% stag); H(EntroPO)
    WORST (100% dup,89% stag,89% search). Distances to clean-instruct centroid: E=86,G=90,H=128. Conclusion:
    tuned-32B traces would contaminate the improvement-opportunity distribution.'
  CLEAN_TRAINING_COHORT:
  - claude_4_7
  - claude_opus_4_5
  - claude_sonnet_3_5
  OPEN_WEIGHT_32B_COHORT_separate:
  - skywork_swe_32b
  ARCHIVED_not_annotated:
  - qwen2_5_code_agent_32b
  - entropo_r2e_qwen30b
  MODEL_TRANSFER_HOLDOUT:
  - claude_4_6
  guarantee: G is reported in a SEPARATE cohort; clean opportunity tables use ONLY A/B/C. E,H never enter
    annotation.
separate_cohorts:
  open_weight_32b:
  - skywork_swe_32b
archived_outliers:
- qwen2_5_code_agent_32b
- entropo_r2e_qwen30b
